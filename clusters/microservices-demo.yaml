---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: onlineboutique
  namespace: default
spec:
  interval: 10m
  type: oci
  url: oci://us-docker.pkg.dev/online-boutique-ci/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: onlineboutique
  namespace: default
spec:
  interval: 10m
  chart:
    spec:
      chart: onlineboutique
      sourceRef:
        kind: HelmRepository
        name: onlineboutique
  releaseName: onlineboutique